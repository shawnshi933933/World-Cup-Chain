kind = "web"
previewPath = "/"
title = "炜新联手征战世界杯"
version = "1.0.0"
id = "artifacts/world-cup"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21111

[services.development]
run = "pnpm --filter @workspace/world-cup run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/world-cup", "run", "build" ]
publicDir = "artifacts/world-cup/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21111"
BASE_PATH = "/"
